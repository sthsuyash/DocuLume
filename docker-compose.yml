name: doculume

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doculume-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n '$$REDIS_PASSWORD' ]; then redis-server --requirepass $$REDIS_PASSWORD; else redis-server; fi"
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        sh -c "if [ -n '$$REDIS_PASSWORD' ]; then redis-cli -a $$REDIS_PASSWORD ping; else redis-cli ping; fi"
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - doculume-network

  # Elasticsearch (vector store)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - doculume-network

  # Monitoring (optional profile)
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./backend/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - doculume-network

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - doculume-network

  node-exporter:
    image: prom/node-exporter:latest
    profiles: ["monitoring"]
    ports:
      - "9100:9100"
    networks:
      - doculume-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    profiles: ["monitoring"]
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - doculume-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    profiles: ["monitoring"]
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpass}@postgres:5432/${POSTGRES_DB:-ragdb}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doculume-network

  # Tracing (optional profile)
  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["tracing"]
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - doculume-network

  # Scheduled database backup (optional profile — enable with --profile backup)
  db-backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
      BACKUP_DIR: /backups
    volumes:
      - ./scripts/backup-db.sh:/backup-db.sh:ro
      - db_backups:/backups
    entrypoint: >
      sh -c "echo '0 2 * * * sh /backup-db.sh >> /var/log/backup.log 2>&1' | crontab - && crond -f"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doculume-network
    restart: unless-stopped

  # Reverse proxy (optional profile — enable with --profile proxy)
  nginx:
    image: nginx:1.27-alpine
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_CERT_PATH:-./docker/nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      - postgres
      - redis
    networks:
      - doculume-network
    restart: unless-stopped

  # Note:
  # This compose file intentionally includes infrastructure services only.
  # Run backend/frontend directly on host for local development, or use hosted services.

volumes:
  postgres_data:
  redis_data:
  es_data:
  prometheus_data:
  grafana_data:
  db_backups:

networks:
  doculume-network:
    driver: bridge
