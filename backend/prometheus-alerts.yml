groups:
  - name: doculume.service
    rules:
      - alert: BackendDown
        expr: up{job="fastapi"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend API is down"
          description: "The FastAPI backend has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{job="fastapi", status=~"5.."}[5m])
          / rate(http_requests_total{job="fastapi"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate ({{ printf \"%.1f\" $value | humanize }}%)"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

      - alert: SlowResponses
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="fastapi"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 response time above 2s"
          description: "95th percentile response time is {{ $value | humanizeDuration }}."

  - name: doculume.database
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "The postgres-exporter cannot reach PostgreSQL."

      - alert: DBConnectionPoolNearFull
        expr: |
          pg_stat_activity_count{state="active"}
          / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB connection pool above 80%"
          description: "{{ printf \"%.0f\" $value }}% of max_connections are in use."

      - alert: DBHighReplicationLag
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Replication lag above 30s"
          description: "Replication lag is {{ $value | humanizeDuration }}."

  - name: doculume.redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "The redis-exporter cannot reach Redis."

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory above 85%"
          description: "Redis is using {{ printf \"%.0f\" $value }}% of its configured max memory."

  - name: doculume.infrastructure
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU above 85% on {{ $labels.instance }}"
          description: "CPU usage has been above 85% for 10 minutes."

      - alert: HighMemory
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory above 90% on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.0f\" $value }}%."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"}
          / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Less than 10% disk space on {{ $labels.instance }}"
          description: "Only {{ printf \"%.1f\" $value }}% of disk space remains."
